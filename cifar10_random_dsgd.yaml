description: "CIFAR-10 D-SGD with random topology (avg degree 4) and high non-IID data"

network:
  package: "p2pfl.communication.protocols.protobuff.grpc"
  protocol: "GrpcCommunicationProtocol"
  nodes: 24
  topology: "random_max_4"

experiment:
  name: "cifar10_random_dsgd"
  rounds: 3
  epochs: 1
  trainset_size: 24
  seed: 666
  wait_timeout: 300

  dataset:
    source: "huggingface"
    name: "p2pfl/CIFAR10"
    batch_size: 64
    transforms:
      package: "p2pfl.examples.cifar10.transforms"
      function: "get_cifar10_transforms"
      params: {}
    partitioning:
      package: "p2pfl.learning.dataset.partition_strategies"
      strategy: "DirichletPartitionStrategy"
      reduced_dataset: false
      reduction_factor: 10
      params:
        alpha: 0.1

  model:
    package: "p2pfl.examples.cifar10.model.cifar_convnet_pytorch"
    model_build_fn: "model_build_fn"
    params:
      lr_rate: 0.1

  aggregator:
    package: "p2pfl.learning.aggregators.d_sgd"
    aggregator: "DSGD"
    params: {}

settings:
  general:
    log_level: "INFO"
    grpc_timeout: 60
    disable_ray: false
    resource_monitor_period: 300

  SSL:
    use_ssl: false

  heartbeat:
    period: 10
    timeout: 999999
    wait_convergence: 180
    exclude_beat_logs: true

  gossip:
    period: 1
    ttl: 30  # Increased TTL for sparse topology (20 nodes, avg degree 5)
    messages_per_period: 9999999
    amount_last_messages_saved: 1000
    models_period: 1
    models_per_round: 4
    exit_on_x_equal_rounds: 100

  training:
    vote_timeout: 120
    aggregation_timeout: 1800
    ray_actor_pool_size: 24
    neighbor_only_aggregation: false  # Use TrainStage with temporary connections for YAML

profiling:
  enabled: false
  measure_time: true
  output_dir: "profile/cifar10_random_dsgd"
