description: "MNIST D-SGD with random topology (avg degree 5) and high non-IID data"

network:
  package: "p2pfl.communication.protocols.protobuff.memory"
  protocol: "MemoryCommunicationProtocol"
  nodes: 2
  topology: "random_3"  # Random topology with average degree 5

experiment:
  name: "mnist_random_dsgd"
  rounds: 100
  epochs: 1
  trainset_size: 8  # Reduced to ensure Ray actor availability (10 actors, need some spare capacity)
  seed: 666
  wait_timeout: 300

  dataset:
    source: "huggingface"
    name: "p2pfl/MNIST"
    batch_size: 128
    partitioning:
      package: "p2pfl.learning.dataset.partition_strategies"
      strategy: "DirichletPartitionStrategy"
      reduced_dataset: false
      reduction_factor: 10
      params:
        alpha: 0.1  # High non-IID

  model:
    package: "p2pfl.examples.mnist.model.mlp_pytorch"
    model_build_fn: "model_build_fn"
    params:
      lr_rate: 0.1

  aggregator:
    package: "p2pfl.learning.aggregators.d_sgd"
    aggregator: "DSGD"
    params: {}

settings:
  general:
    log_level: "INFO"
    grpc_timeout: 60
    disable_ray: false
    resource_monitor_period: 10

  SSL:
    use_ssl: false

  heartbeat:
    period: 10
    timeout: 600  # 10 minutes - increased for slow nodes
    wait_convergence: 60  # Wait 60s for all nodes to sync before starting round
    exclude_beat_logs: true

  gossip:
    period: 1
    ttl: 30  # Increased TTL for sparse topology (20 nodes, avg degree 5)
    messages_per_period: 200
    amount_last_messages_saved: 1000
    models_period: 1
    models_per_round: 4
    exit_on_x_equal_rounds: 100  # High threshold to ensure completion

  training:
    vote_timeout: 60
    aggregation_timeout: 1800  # 30 minutes
    ray_actor_pool_size: 10
    neighbor_only_aggregation: false  # Use TrainStage with temporary connections for YAML

profiling:
  enabled: false
  measure_time: true
  output_dir: "profile/mnist_random_dsgd"
