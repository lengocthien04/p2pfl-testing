description: "MNIST D-SGD with D-Cliques topology (clique size 3) and clique averaging"

network:
  package: "p2pfl.communication.protocols.protobuff.memory"
  protocol: "MemoryCommunicationProtocol"
  nodes: 12
  topology: "dclique_3"

experiment:
  name: "mnist_dclique_cliqueavg"
  rounds: 100
  epochs: 1
  trainset_size: 12
  seed: 666
  wait_timeout: 300

  dataset:
    source: "huggingface"
    name: "p2pfl/MNIST"
    batch_size: 128
    partitioning:
      package: "p2pfl.learning.dataset.partition_strategies"
      strategy: "DirichletPartitionStrategy"
      reduced_dataset: false
      reduction_factor: 1
      params:
        alpha: 0.1
        self_balancing: true

  model:
    package: "p2pfl.examples.mnist.model.mlp_pytorch"
    model_build_fn: "model_build_fn"
    params:
      lr_rate: 0.1

  aggregator:
    package: "p2pfl.learning.aggregators.d_sgd_clique_avg"
    aggregator: "DSGDCliqueAvg"
    params:
      disable_partial_aggregation: true
      clique_weight_ratio: 2.0

settings:
  general:
    log_level: "INFO"
    grpc_timeout: 60
    disable_ray: false
    resource_monitor_period: 10

  SSL:
    use_ssl: false

  heartbeat:
    period: 10
    timeout: 600
    wait_convergence: 60
    exclude_beat_logs: true

  gossip:
    period: 1
    ttl: 30
    messages_per_period: 9999999
    amount_last_messages_saved: 1000
    models_period: 0.5
    models_per_round: 10
    exit_on_x_equal_rounds: 100

  training:
    vote_timeout: 60
    aggregation_timeout: 1800
    ray_actor_pool_size: 12
    neighbor_only_aggregation: true

profiling:
  enabled: false
  measure_time: true
  output_dir: "profile/mnist_dclique_cliqueavg"
